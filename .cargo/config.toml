[test]
# Tests hook the same `add` function and share global statics (CALL_COUNT, ORIGINAL).
# Running them in parallel causes data races and spurious failures.
args = ["--test-threads=1"]

[target.riscv64gc-unknown-linux-gnu]
linker = "riscv64-linux-gnu-gcc"
runner = "qemu-riscv64-static -L /usr/riscv64-linux-gnu"
